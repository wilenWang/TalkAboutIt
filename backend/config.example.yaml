# TalkAboutIt 后端配置
# API Key 通过环境变量注入，不在此文件中填写

server:
  port: 8080
  host: "0.0.0.0"

llm:
  default: deepseek
  providers:
    deepseek:
      type: openai
      base_url: https://api.deepseek.com
      model: deepseek-v4-pro
      # api_key 由 DEEPSEEK_API_KEY 环境变量注入
    openai:
      type: openai
      model: gpt-4o
      # api_key 由 OPENAI_API_KEY 环境变量注入
    claude:
      type: anthropic
      model: claude-sonnet-4-20250514
      # api_key 由 ANTHROPIC_API_KEY 环境变量注入

personas:
  dir: personas

session:
  db_path: data/sessions.db
  max_rounds: 3
